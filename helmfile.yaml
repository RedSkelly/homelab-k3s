# Helmfile — Bootstrap and Break-Glass Helm Release Management
#
# ROLE: Helmfile is the BOOTSTRAP and BREAK-GLASS tool for this cluster.
# Argo CD is the primary GitOps reconciler for day-to-day operations.
#
# When to use Helmfile:
#   1. Initial cluster standup — deploy the platform stack before Argo CD exists
#   2. Emergency recovery — manually sync releases if Argo CD is down
#   3. Rapid iteration — test Helm value changes before committing to Git
#
# When NOT to use Helmfile:
#   - Routine deployments — let Argo CD reconcile from Git
#   - Application rollouts — use Argo CD's progressive delivery features
#
# Usage:
#   helmfile diff         # Preview changes before applying
#   helmfile sync         # Deploy/update all releases
#   helmfile status       # Check release status
#
# Values files live alongside their component in kubernetes/<layer>/<component>/values.yaml.
# Both Helmfile and Argo CD reference the same values files — single source of truth.

---
helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true
  historyMax: 5

repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  # --- core ---
  # cert-manager: migrated to Argo CD management (2026-04-29).
  # Application manifest: kubernetes/bootstrap/argocd/applications/cert-manager.yaml

  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.14.1
    values:
      - kubernetes/core/ingress-nginx/values.yaml

  # --- monitoring ---
  - name: kps
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 81.0.0
    values:
      - kubernetes/monitoring/kube-prometheus-stack/values.yaml
    secrets:
      - kubernetes/monitoring/kube-prometheus-stack/secrets.values.yaml

  # --- bootstrap ---
  - name: argocd
    namespace: argocd
    chart: argo/argo-cd
    version: 9.5.9
    values:
      - kubernetes/bootstrap/argocd/values.yaml
