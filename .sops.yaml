# SOPS configuration for encrypting secrets in Git.
#
# All files matching the creation_rules patterns below are encrypted with age.
# Encrypted files can be committed safely; decrypted files (*.dec) are gitignored.
#
# Usage:
#   Encrypt:  sops --encrypt --in-place secrets.<name>.yaml
#   Decrypt:  sops --decrypt secrets.<name>.yaml
#   Edit:     sops secrets.<name>.yaml
#
# Key location: ~/.config/sops/age/keys.txt (must exist on each management workstation)

creation_rules:
  - path_regex: secrets\..*\.yaml$
    age: age175q56r04k72n3de8aaanz6dydd5g38qs6gh2shmryvu5x6335vasmmd8e7
